name: Release Build

on:
  workflow_dispatch:

  release:
    types: [ published ]

env:
  version_status: "release"

jobs:
  build:
    uses: Crazy-Crew/.github/.github/workflows/build.yml@main

    with:
      branch: main

    secrets:
      webhook: ${{ secrets.BUILD_WEBHOOK }}
      modrinth_token: ${{ secrets.MODRINTH_TOKEN }}
      hangar_token: ${{ secrets.HANGAR_KEY }}